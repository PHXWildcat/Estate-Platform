# Gitleaks configuration. Extends the default ruleset — never replaces it.
#
# Allowlist policy: entries must be provably non-secret, scoped as narrowly as
# possible, and justified here. Broad path or rule exclusions are not accepted.

[extend]
useDefault = true

[allowlist]
description = "Persisted-operations manifest: sha256 hashes OF PUBLIC GraphQL documents (generated by apps/web/scripts/build-persisted-manifest.mjs, verified in sync by a jest test). High-entropy hex adjacent to words like 'password' (GraphQL variable names) false-positives the generic-api-key rule; the hashes are derived from checked-in public text and cannot be secrets."
paths = [
  '''apps/web/persisted-manifest\.json''',
]
